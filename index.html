<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ultra Smooth 3D Book</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; }
        #instruction {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.5); font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instruction">CLICK ĐỂ LẬT TRANG (MƯỢT MÀ)</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <!-- Import GSAP để xử lý animation mượt -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Tăng độ nét
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Làm cho việc xoay camera mượt hơn

        // Ánh sáng phức tạp hơn để nhìn cho thật
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 15, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Tạo Cuốn sách
        const pages = [];
        const pageCount = 6;
        const pW = 5, pH = 7, pD = 0.01;

        for (let i = 0; i < pageCount; i++) {
            const geometry = new THREE.BoxGeometry(pW, pH, pD);
            // Tạo 2 mặt khác màu (Trắng cho trang giấy, Nâu cho bìa)
            const materials = [
                new THREE.MeshPhongMaterial({color: 0xcccccc}), // cạnh
                new THREE.MeshPhongMaterial({color: 0xcccccc}), // cạnh
                new THREE.MeshPhongMaterial({color: 0xcccccc}), // cạnh
                new THREE.MeshPhongMaterial({color: 0xcccccc}), // cạnh
                new THREE.MeshPhongMaterial({color: i === 0 ? 0x5c3c2e : 0xffffff}), // mặt trước
                new THREE.MeshPhongMaterial({color: i === 0 ? 0x5c3c2e : 0xf0f0f0}), // mặt sau
            ];

            const mesh = new THREE.Mesh(geometry, materials);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.x = pW / 2;

            const pivot = new THREE.Group();
            pivot.add(mesh);
            // Khoảng cách giữa các trang cực nhỏ để tránh nhấp nháy
            pivot.position.z = -i * 0.02; 
            
            scene.add(pivot);
            pages.push(pivot);
        }

        let currentPage = 0;
        let isAnimating = false;

        window.addEventListener('mousedown', (e) => {
            if (e.button !== 0 || isAnimating || currentPage >= pageCount) return;

            isAnimating = true;
            const page = pages[currentPage];

            // Dùng GSAP Timeline để kết hợp Quay và Nhấc trang lên cùng lúc
            const tl = gsap.timeline({
                onComplete: () => {
                    isAnimating = false;
                    currentPage++;
                }
            });

            // 1. Animation quay 180 độ
            tl.to(page.rotation, {
                y: -Math.PI,
                duration: 1.4,
                ease: "power2.inOut" // Kiểu di chuyển mượt (chậm-nhanh-chậm)
            }, 0);

            // 2. Animation "Nhấc trang" (bay lên theo hình cầu) để không bị đè trang dưới
            tl.to(page.position, {
                y: 1.5, // Nhấc lên cao 1.5 đơn vị
                duration: 0.7,
                ease: "power1.out"
            }, 0);
            
            tl.to(page.position, {
                y: 0, // Hạ xuống lại khi kết thúc lật
                duration: 0.7,
                ease: "power1.in"
            }, 0.7);

            // 3. Đẩy trang lên phía trước một chút để sau khi lật nó nằm trên trang cũ
            tl.to(page.position, {
                z: currentPage * 0.05 + 0.1,
                duration: 1.4
            }, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Cần thiết cho enableDamping
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
