<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>3D Real Flip Book</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; }
        #instruction {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instruction">CLICK VÀO BÊN PHẢI ĐỂ LẬT TRANG</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Setup cơ bản
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Đặt camera nhìn xéo để thấy hiệu ứng 3D rõ nhất
        camera.position.set(0, 10, 15); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);

        // 2. Tạo cuốn sách
        const book = new THREE.Group();
        scene.add(book);

        const pageCount = 8;
        const pages = [];
        const pageW = 5;
        const pageH = 7;
        const pageDepth = 0.02;

        for (let i = 0; i < pageCount; i++) {
            // Tạo Geometry cho trang giấy
            const geometry = new THREE.BoxGeometry(pageW, pageH, pageDepth);
            
            // Màu sắc xen kẽ để dễ nhìn
            const material = new THREE.MeshPhongMaterial({ 
                color: i === 0 ? 0x8b4513 : 0xeeeeee // Trang đầu màu nâu (bìa), còn lại màu trắng
            });

            const mesh = new THREE.Mesh(geometry, material);
            
            // QUAN TRỌNG: Dịch chuyển Mesh sang phải 1/2 chiều rộng 
            // Để tâm của Group (pivot) nằm đúng gáy sách (mép trái trang giấy)
            mesh.position.x = pageW / 2;

            const pivot = new THREE.Group();
            pivot.add(mesh);
            
            // Xếp các trang chồng lên nhau theo trục Z (độ dày cuốn sách)
            pivot.position.z = i * (pageDepth + 0.005); 
            
            book.add(pivot);
            pages.push(pivot);
        }

        // 3. Logic lật trang
        let currentPage = 0;
        const targetRotations = pages.map(() => 0);

        window.addEventListener('mousedown', (e) => {
            // Chỉ lật khi click chuột trái
            if (e.button !== 0) return;

            if (currentPage < pageCount) {
                // Lật trang hiện tại sang trái 180 độ (PI)
                targetRotations[currentPage] = -Math.PI;
                currentPage++;
            } else {
                // Nếu hết trang thì reset lại từ đầu
                for(let i=0; i<pageCount; i++) targetRotations[i] = 0;
                currentPage = 0;
            }
        });

        // 4. Render loop
        function animate() {
            requestAnimationFrame(animate);

            pages.forEach((page, index) => {
                // Lật trang theo trục Y (trục đứng của gáy sách)
                page.rotation.y = THREE.MathUtils.lerp(page.rotation.y, targetRotations[index], 0.1);
                
                // Nâng trang đang lật lên một chút để tránh trùng lặp hình ảnh (Z-fighting)
                if (Math.abs(page.rotation.y) > 0.1 && Math.abs(page.rotation.y) < Math.PI - 0.1) {
                    page.position.y = 0.5; // Nhấc lên khi đang bay
                } else {
                    page.position.y = 0;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
