<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Book - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        #instruction {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="instruction">Click chuột trái để lật trang | Chuột phải để xoay không gian</div>

    <!-- Sử dụng Import Map để sửa lỗi "deprecated" trong console của bạn -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Khởi tạo Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        // 2. Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);

        // 3. Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 4. OrbitControls (Để bạn có thể dùng chuột xoay nhìn cuốn sách)
        const controls = new OrbitControls(camera, renderer.domElement);

        // 5. Ánh sáng (Rất quan trọng để thấy vật thể)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 150);
        pointLight.position.set(5, 10, 5);
        pointLight.castShadow = true;
        scene.add(pointLight);

        // 6. Tạo Cuốn sách
        const pages = [];
        const pageCount = 6;
        const pageGeometry = new THREE.BoxGeometry(4, 6, 0.05);

        for (let i = 0; i < pageCount; i++) {
            // Tạo màu sắc ngẫu nhiên cho mỗi trang
            const material = new THREE.MeshPhongMaterial({ 
                color: new THREE.Color(`hsl(${i * 40}, 70%, 50%)`) 
            });
            const pageMesh = new THREE.Mesh(pageGeometry, material);
            pageMesh.castShadow = true;
            
            // Đẩy mesh sang phải để bản lề nằm ở mép trái
            pageMesh.position.x = 2; 

            const pivot = new THREE.Group();
            pivot.add(pageMesh);
            // Xếp chồng các trang lên nhau một chút
            pivot.position.y = i * 0.08; 
            
            scene.add(pivot);
            pages.push(pivot);
        }

        // 7. Hiệu ứng lật trang (Sử dụng code thuần thay vì GSAP để bạn dễ test trước)
        let currentPage = 0;
        let targetRotations = pages.map(() => 0);

        window.addEventListener('mousedown', (event) => {
            if (event.button === 0) { // Click chuột trái
                if (currentPage < pageCount) {
                    targetRotations[currentPage] = -Math.PI + 0.1; // Lật 180 độ
                    currentPage++;
                } else {
                    // Reset nếu lật hết trang
                    targetRotations.fill(0);
                    currentPage = 0;
                }
            }
        });

        // 8. Render Loop
        function animate() {
            requestAnimationFrame(animate);

            // Mượt mà hóa chuyển động quay
            pages.forEach((page, index) => {
                page.rotation.z = THREE.MathUtils.lerp(page.rotation.z, targetRotations[index], 0.1);
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Xử lý resize màn hình
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
